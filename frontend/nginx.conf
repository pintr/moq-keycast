# ── nginx config for serving Vite-built static assets ────────────────────────
#
# The frontend container runs nginx to serve the production build from /usr/share/nginx/html.
# All paths that don't match a file are rewritten to index.html so that the SPA
# can handle any URL without a 404.
#
# The frontend never acts as a reverse proxy to the relay -- browsers connect
# to the relay directly on the host-mapped port 4443.
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Long-lived cache for versioned assets (Vite adds content hashes to filenames)
    location ~* \.(js|css|woff2?|png|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback: any non-file request serves index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Disable access log noise for health checks
    location = /health {
        access_log off;
        return 200 "ok";
    }

    # Disable .htaccess and hidden files
    location ~ /\. {
        deny all;
    }
}
