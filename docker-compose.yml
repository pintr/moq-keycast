# =============================================================================
# docker-compose.yml – moq-chat (root)
# =============================================================================
#
# Services:
#
#   relay     – moq-relay: the shared MoQ pub/sub server.
#               All clients (browser and TUI) connect to this.
#               Handles QUIC/WebTransport (UDP 4443) and the HTTP fingerprint
#               endpoint + WebSocket fallback (TCP 4443).
#
#   frontend  – Vite-built TypeScript SPA served by nginx.
#               Open http://localhost:8080 in a browser to use the chat.
#
#   tui       – Rust terminal UI client. Only started when the "tui" profile
#               is active (see `docker compose run` instructions below).
#               Requires --room and --username to be passed at run time.
#
# ─── How the browser connects ─────────────────────────────────────────────────
#
#   The browser loads the SPA from http://localhost:8080 (frontend container).
#   It then connects DIRECTLY to the relay at http://localhost:4443.
#
#   @moq/lite sees the http:// scheme and:
#     1. Fetches  http://localhost:4443/certificate.sha256  (HTTP over TCP)
#        to get the relay's self-signed TLS certificate fingerprint.
#     2. Opens a WebTransport session to https://localhost:4443 (QUIC over UDP)
#        using that fingerprint via `serverCertificateHashes`.
#     3. Falls back to WebSocket ws://localhost:4443 if QUIC is unavailable.
#
# ─── How the TUI client connects ──────────────────────────────────────────────
#
#   The TUI container is on the same Docker network as the relay, so it
#   connects using the internal service name "relay" (not localhost).
#   --tls-disable-verify skips hostname validation, since the relay cert
#   is issued for "localhost" but the container reaches it as "relay".
#
# ─── Port mapping ─────────────────────────────────────────────────────────────
#
#   Host 4443/tcp  →  relay:4443/tcp  (HTTP: TLS fingerprint + WebSocket)
#   Host 4443/udp  →  relay:4443/udp  (QUIC/WebTransport)
#   Host 8080/tcp  →  frontend:80/tcp (nginx serving the SPA)
#
# =============================================================================

services:
  # ── moq-relay ───────────────────────────────────────────────────────────────
  relay:
    build:
      context: ./relay
      dockerfile: Dockerfile
    container_name: moq-relay

    # Expose port 4443 on BOTH TCP (HTTP/WebSocket) and UDP (QUIC/WebTransport).
    ports:
      - "4443:4443/tcp"
      - "4443:4443/udp"

    command:
      - "--server-bind"
      - "[::]:4443"
      - "--web-http-listen"
      - "[::]:4443"
      # Auto-generate a self-signed TLS cert for "localhost".
      # The fingerprint is served at /certificate.sha256 so @moq/lite can
      # trust it without a CA (via serverCertificateHashes in WebTransport).
      - "--tls-generate"
      - "localhost"
      # Make all paths publicly readable/writable — dev only.
      # Replace with --auth-key for production deployments.
      - "--auth-public"
      - ""

    ulimits:
      nofile:
        soft: 65536
        hard: 65536

    restart: unless-stopped

  # ── Browser SPA (TypeScript / Vite / nginx) ─────────────────────────────────
  frontend:
    build:
      context: ./ts/frontend
      dockerfile: Dockerfile
      args:
        # Baked into the JS bundle at build time.
        # Browsers connect to the relay directly on the host-mapped port.
        VITE_RELAY_URL: http://localhost:4443
    container_name: moq-chat-frontend
    ports:
      - "8080:80"
    depends_on:
      - relay
    restart: unless-stopped

  # ── Rust TUI client ─────────────────────────────────────────────────────────
  # Only activated with the "tui" profile; never starts automatically.
  #
  # Run it with:
  #   docker compose run --rm tui --username <name>
  #
  # Optionally override the room (defaults to "general"):
  #   docker compose run --rm tui --username <name> --room <room>
  #
  # The service connects to the relay via the internal Docker network
  # using the service name "relay", not "localhost".
  tui:
    build:
      context: ./rs
      dockerfile: Dockerfile
    # Required for the ratatui TUI to work inside a container.
    stdin_open: true
    tty: true
    depends_on:
      - relay
    # Default CLI flags; --room and --username must be supplied via
    # `docker compose run tui --room <name> --username <name>`.
    command:
      - "--relay"
      - "https://relay:4443"
      # The relay cert is issued for "localhost" but we're reaching it
      # by the Docker service name "relay", so skip hostname verification.
      - "--tls-disable-verify"
    profiles:
      - tui
